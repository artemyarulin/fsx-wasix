<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>fsx WASIX Oracle</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-screen overflow-hidden bg-slate-950 text-slate-100">
    <main class="mx-auto flex h-screen max-w-7xl gap-6 overflow-hidden p-6">
      <section class="h-full w-1/2 overflow-auto rounded-2xl border border-slate-800 bg-slate-900/80 p-6 shadow-2xl">
        <div class="mb-6">
          <h1 class="text-3xl font-semibold uppercase tracking-[0.3em] text-cyan-300">FSX WASIX</h1>
        </div>

        <form id="run-form" class="space-y-5">
          <input id="chain_length" name="chain_length" type="hidden" value="3" />

          <div class="rounded-xl border border-slate-800 bg-slate-950 p-4 text-sm">
            <div class="flex items-center justify-between gap-4">
              <span class="text-slate-400">Version</span>
              <code id="build_version" class="text-cyan-300">0.20260429.183705</code>
            </div>
            <div class="mt-3">
              <div class="text-slate-400">Syscalls</div>
              <div id="syscall_summary" class="mt-2 text-xs leading-5 text-slate-300">
                open(read_write_create), close, write(32_bytes:32), read(32_bytes:32)
              </div>
            </div>
          </div>

          <label class="block">
            <span class="text-sm font-medium text-slate-300">Bundled native oracle</span>
            <select
              id="oracle_preset"
              class="mt-2 w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 outline-none ring-cyan-400/40 focus:ring-4"
            >
              <option value="">No bundled expected report</option>
              <option value="1|/oracle/native-oracle-l1.bin">Len=1 native oracle</option>
              <option value="2|/oracle/native-oracle-l2.bin">Len=2 native oracle</option>
              <option value="3|/oracle/native-oracle-l3.bin" selected>Len=3 native oracle</option>
              <option value="4|/oracle/native-oracle-l4.bin">Len=4 native oracle</option>
              <option value="5|/oracle/native-oracle-l5.bin">Len=5 native oracle</option>
            </select>
          </label>

          <label class="block">
            <span class="text-sm font-medium text-slate-300">Oracle root</span>
            <input
              id="root"
              name="root"
              value="/data/fsx-oracle-ws"
              class="mt-2 w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 outline-none ring-cyan-400/40 focus:ring-4"
            />
          </label>

          <label class="block">
            <span class="text-sm font-medium text-slate-300">Output report</span>
            <input
              id="output"
              name="output"
              value="/data/fsx-oracle-ws/oracle-report-l3-v0.20260429.183705.bin"
              class="mt-2 w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 outline-none ring-cyan-400/40 focus:ring-4"
            />
          </label>

          <label class="block">
            <span class="text-sm font-medium text-slate-300">Expected report (optional)</span>
            <input
              id="expected"
              name="expected"
              value="/oracle/native-oracle-l3.bin"
              placeholder="/oracle/native-oracle-l3.bin"
              class="mt-2 w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 outline-none ring-cyan-400/40 focus:ring-4"
            />
          </label>

          <div class="rounded-xl border border-slate-800 bg-slate-950 p-4">
            <div class="flex items-center justify-between text-sm">
              <span class="text-slate-400">Endpoint</span>
              <code id="endpoint" class="text-cyan-300"></code>
            </div>
            <div class="mt-3 h-3 overflow-hidden rounded-full bg-slate-800">
              <div id="bar" class="h-full w-0 rounded-full bg-cyan-400 transition-all"></div>
            </div>
            <div class="mt-3 flex justify-between text-sm text-slate-400">
              <span id="status">Idle</span>
              <span id="counter">0/0</span>
            </div>
          </div>

          <button
            id="start"
            type="submit"
            class="w-full rounded-xl bg-cyan-400 px-5 py-3 font-semibold text-slate-950 shadow-lg shadow-cyan-400/20 transition hover:bg-cyan-300 disabled:cursor-not-allowed disabled:bg-slate-600 disabled:text-slate-300"
          >
            START
          </button>
        </form>
      </section>

      <section class="flex h-full min-h-0 w-1/2 flex-col overflow-hidden rounded-2xl border border-slate-800 bg-black shadow-2xl">
        <div class="shrink-0 flex items-center justify-between border-b border-slate-800 px-5 py-4">
          <div>
            <h2 class="font-semibold">Progress Stream</h2>
            <p class="text-sm text-slate-500">Messages from /wss</p>
          </div>
          <button id="clear" class="rounded-lg border border-slate-700 px-3 py-2 text-sm text-slate-300 hover:bg-slate-900">
            Clear
          </button>
        </div>
        <pre id="log" class="min-h-0 flex-1 overflow-y-auto overflow-x-hidden whitespace-pre-wrap break-words p-5 font-mono text-sm leading-6 text-emerald-300"></pre>
      </section>
    </main>

    <script>
      const endpoint = document.getElementById("endpoint");
      const form = document.getElementById("run-form");
      const start = document.getElementById("start");
      const log = document.getElementById("log");
      const status = document.getElementById("status");
      const counter = document.getElementById("counter");
      const bar = document.getElementById("bar");
      const clear = document.getElementById("clear");
      const oraclePreset = document.getElementById("oracle_preset");
      const chainLength = document.getElementById("chain_length");
      const expected = document.getElementById("expected");
      const root = document.getElementById("root");
      const output = document.getElementById("output");
      const buildVersion = document.getElementById("build_version");

      function wsUrl() {
        const scheme = window.location.protocol === "https:" ? "wss:" : "ws:";
        return `${scheme}//${window.location.host}/wss`;
      }

      endpoint.textContent = wsUrl();

      function append(line) {
        log.textContent += `${line}\n`;
        log.scrollTop = log.scrollHeight;
      }

      function setProgress(percent, index, total) {
        bar.style.width = `${Math.min(100, Math.max(0, percent))}%`;
        counter.textContent = `${index}/${total}`;
      }

      function selectedLength() {
        return chainLength.value || "3";
      }

      function safeVersion() {
        return buildVersion.textContent.trim().replace(/[^A-Za-z0-9_.-]/g, "_");
      }

      function reportPath() {
        const base = root.value.replace(/\/+$/, "") || "/data/fsx-oracle-ws";
        return `${base}/oracle-report-l${selectedLength()}-v${safeVersion()}.bin`;
      }

      function refreshOutputPath() {
        output.value = reportPath();
      }

      clear.addEventListener("click", () => {
        log.textContent = "";
      });

      oraclePreset.addEventListener("change", () => {
        const value = oraclePreset.value;
        if (!value) {
          expected.value = "";
          return;
        }
        const [length, path] = value.split("|");
        chainLength.value = length;
        expected.value = path;
        refreshOutputPath();
      });

      root.addEventListener("change", refreshOutputPath);
      root.addEventListener("blur", refreshOutputPath);
      refreshOutputPath();

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        log.textContent = "";
        setProgress(0, 0, 0);
        status.textContent = "Connecting";
        start.disabled = true;
        refreshOutputPath();

        const socket = new WebSocket(wsUrl());
        socket.addEventListener("open", () => {
          const params = new URLSearchParams(new FormData(form));
          append(`> start ${params.toString()}`);
          socket.send(params.toString());
        });

        socket.addEventListener("message", (event) => {
          let message;
          try {
            message = JSON.parse(event.data);
          } catch {
            append(event.data);
            return;
          }

          if (message.type === "ready") {
            status.textContent = "Connected";
          } else if (message.type === "started") {
            status.textContent = `Running L=${message.chain_length}`;
            append(`started root=${message.root} output=${message.output}`);
          } else if (message.type === "progress") {
            status.textContent = message.line;
            setProgress(message.percent, message.index, message.total);
            append(message.line);
          } else if (message.type === "verifying") {
            status.textContent = "Verifying";
            append(`verifying: ${message.actual} vs ${message.expected}`);
          } else if (message.type === "verified") {
            status.textContent = "Verified";
            append(`verified: ${message.expected}`);
          } else if (message.type === "done") {
            status.textContent = "Done";
            setProgress(100, counter.textContent.split("/")[1] || 0, counter.textContent.split("/")[1] || 0);
            append("done: ok");
          } else if (message.type === "error") {
            status.textContent = "Error";
            append(`error: ${message.error}`);
          } else {
            append(JSON.stringify(message));
          }
        });

        socket.addEventListener("close", () => {
          start.disabled = false;
          append("> socket closed");
        });

        socket.addEventListener("error", () => {
          status.textContent = "Socket error";
          append("error: websocket failed");
        });
      });
    </script>
  </body>
</html>
